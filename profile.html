        .main-nav a {
            color: #ccc;

            font-weight: bold;

        }
        .main-nav a:hover {

            box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .profile-img:hover {
            transform: scale(1.05);
        }

            color: #6c757d;
            font-size: 1.3rem;
            margin: 0 12px;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .social-icons a:hover {
            color: #0d6efd;
            transform: translateY(-3px);
            display: inline-block;
        }

        .bio-text {
            color: #555;
            line-height: 1.6;
        }

        .container-main {
